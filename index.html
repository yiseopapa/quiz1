<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="전입시험">
<meta name="theme-color" content="#1a5276">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>도 전입시험 퀴즈</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Malgun Gothic','맑은 고딕',sans-serif;background:#f0f4f8;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:16px;}
.container{background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.10);max-width:700px;width:100%;overflow:hidden;}
.header{background:linear-gradient(135deg,#1a5276,#2980b9);color:white;padding:20px 24px;text-align:center;}
.header h1{font-size:1.3rem;margin-bottom:4px;}
.header .sub{font-size:.82rem;opacity:.85;}
.install-banner{display:none;align-items:center;justify-content:space-between;gap:10px;padding:10px 18px;background:#1a5276;color:white;font-size:.8rem;flex-wrap:wrap;}
.install-banner.show{display:flex;}
.install-banner button{padding:6px 14px;border:none;border-radius:6px;background:#1abc9c;color:white;font-weight:700;cursor:pointer;font-size:.8rem;}
.install-banner .xbtn{background:transparent;opacity:.7;font-size:1rem;padding:4px 8px;}
.stats{display:flex;justify-content:center;gap:16px;padding:12px 20px;background:#eaf2fb;border-bottom:1px solid #d5e8f7;font-size:.82rem;color:#1a5276;flex-wrap:wrap;}
.stat{text-align:center;}
.stat strong{display:block;font-size:1.2rem;color:#154360;}
.prog-wrap{height:5px;background:#d5e8f7;}
.prog-bar{height:100%;background:linear-gradient(90deg,#2980b9,#1abc9c);transition:width .4s;}
/* 탭 바 */
.tab-bar{display:flex;gap:5px;padding:10px 16px 0;flex-wrap:wrap;}
.tbtn{flex:1;min-width:70px;padding:7px 5px;border:2px solid #d0e8f8;border-radius:7px;background:white;color:#1a3a5c;font-size:.7rem;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;}
.tbtn:hover,.tbtn.active{background:#2980b9;color:white;border-color:#2980b9;}
.sec-label{padding:5px 16px;font-size:.72rem;color:#888;background:#fafcff;border-bottom:1px solid #e8f0f8;}
/* 화면 */
.screen{display:none;padding:20px;}
.screen.show{display:block;}
/* 섹션 선택 */
.sec-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px;}
.sec-btn{padding:12px 8px;border:2px solid #d0e8f8;border-radius:10px;background:white;color:#1a3a5c;font-size:.82rem;font-weight:600;cursor:pointer;text-align:center;line-height:1.4;transition:all .15s;}
.sec-btn:hover,.sec-btn.sel{background:#2980b9;color:white;border-color:#2980b9;}
.sec-btn .cnt{font-size:.7rem;font-weight:400;opacity:.8;display:block;}
/* 모의고사 설정 */
.exam-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
.ecnt{padding:12px 4px;border:2px solid #d0e8f8;border-radius:10px;background:white;color:#1a3a5c;font-size:.9rem;font-weight:700;cursor:pointer;text-align:center;transition:all .15s;}
.ecnt small{display:block;font-size:.65rem;font-weight:400;opacity:.8;margin-top:2px;}
.ecnt:hover,.ecnt.sel{background:#2980b9;color:white;border-color:#2980b9;}
/* 퀴즈 */
.q-meta-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:5px;}
.q-meta{font-size:.75rem;color:#999;}
.sec-tag{font-size:.7rem;background:#eaf2fb;color:#1a5276;border-radius:10px;padding:2px 8px;font-weight:600;}
.wrong-badge{display:none;align-items:center;gap:4px;border-radius:20px;padding:2px 9px;font-size:.75rem;font-weight:700;}
.wrong-badge.show{display:flex;}
.wrong-badge.lv1{background:#fef9e7;border:1.5px solid #f9ca24;color:#b7950b;}
.wrong-badge.lv2{background:#fdebd0;border:1.5px solid #e59866;color:#ca6f1e;}
.wrong-badge.lv3{background:#fdf0f0;border:1.5px solid #e74c3c;color:#c0392b;}
.question{font-size:1rem;font-weight:600;color:#1a3a5c;line-height:1.7;margin-bottom:18px;padding:14px 16px;background:#f6fbff;border-left:4px solid #2980b9;border-radius:4px;}
.question.lv1{border-left-color:#f9ca24;background:#fefdf5;}
.question.lv2{border-left-color:#e59866;background:#fdf6ee;}
.question.lv3{border-left-color:#e74c3c;background:#fff8f8;}
.choices{display:flex;flex-direction:column;gap:9px;}
.cbtn{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#fff;border:2px solid #d0e8f8;border-radius:10px;cursor:pointer;font-size:.92rem;color:#1a3a5c;text-align:left;transition:all .15s;line-height:1.5;width:100%;}
.cbtn:hover:not(:disabled){background:#eaf4fd;border-color:#2980b9;transform:translateX(2px);}
.num{min-width:26px;height:26px;background:#d0e8f8;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.82rem;color:#1a5276;flex-shrink:0;}
.cbtn.correct{background:#e8f8f0;border-color:#27ae60;color:#1a6b3a;}
.cbtn.correct .num{background:#27ae60;color:white;}
.cbtn.wrong{background:#fdf0f0;border-color:#e74c3c;color:#922b21;}
.cbtn.wrong .num{background:#e74c3c;color:white;}
.cbtn.reveal{background:#e8f8f0;border-color:#27ae60;opacity:.8;}
.cbtn.reveal .num{background:#27ae60;color:white;}
.cbtn.exam-sel{background:#eaf4fd;border-color:#2980b9;}
.cbtn.exam-sel .num{background:#2980b9;color:white;}
.cbtn:disabled{cursor:default;}
.feedback{display:none;margin-top:14px;padding:12px 16px;border-radius:10px;font-size:.92rem;font-weight:500;align-items:center;gap:9px;}
.feedback.show{display:flex;}
.feedback.ok{background:#e8f8f0;color:#1a6b3a;border:1.5px solid #27ae60;}
.feedback.ng{background:#fdf0f0;color:#922b21;border:1.5px solid #e74c3c;}
.fb-icon{font-size:1.4rem;}
.actions{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap;}
.btn{flex:1;min-width:110px;padding:12px 16px;border:none;border-radius:10px;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .15s;}
.btn-p{background:linear-gradient(135deg,#2980b9,#1abc9c);color:white;}
.btn-p:hover{opacity:.88;transform:translateY(-1px);}
.btn-d{background:#fdf0f0;color:#c0392b;border:2px solid #f1c0bb;}
.btn-d:hover{background:#fce0de;}
/* 결과 */
.result-circle{width:110px;height:110px;border-radius:50%;background:linear-gradient(135deg,#2980b9,#1abc9c);color:white;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:0 4px 16px rgba(41,128,185,.3);}
.result-circle .score{font-size:1.8rem;font-weight:700;}
.result-circle .label{font-size:.72rem;opacity:.85;}
.result-screen h2{font-size:1.2rem;color:#1a3a5c;margin-bottom:6px;text-align:center;}
.result-screen p{color:#666;margin-bottom:14px;line-height:1.8;white-space:pre-line;text-align:center;}
.exam-wrong-item{background:#fff8f8;border:1px solid #fce0de;border-radius:8px;padding:11px 13px;margin-bottom:7px;font-size:.84rem;line-height:1.6;}
.iq{color:#1a3a5c;font-weight:600;margin-bottom:3px;}
.imy{color:#c0392b;}
.ians{color:#27ae60;font-weight:600;}
/* 분석 */
.an-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.an-card{border-radius:10px;padding:12px;text-align:center;}
.an-card .alabel{font-size:.72rem;color:#5d8aab;margin-bottom:3px;}
.an-card .aval{font-size:1.5rem;font-weight:700;}
.an-top-item{display:flex;align-items:center;gap:9px;padding:7px 11px;background:#fff8f8;border:1px solid #fce0de;border-radius:8px;margin-bottom:5px;font-size:.81rem;}
.an-top-rank{min-width:22px;height:22px;border-radius:50%;background:#e74c3c;color:white;font-weight:700;font-size:.72rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.an-top-rank.g{background:#f9ca24;color:#7d6608;}
.an-top-rank.s{background:#bdc3c7;color:#555;}
.an-top-rank.b{background:#ca8a04;color:white;}
.an-wrong-item{padding:9px 11px;background:#fafcff;border:1px solid #d5e8f7;border-radius:8px;margin-bottom:5px;font-size:.8rem;line-height:1.5;color:#1a3a5c;}
.an-wrong-ans{color:#27ae60;font-weight:600;margin-top:2px;}
.review-box{background:#e8f0fe;border-radius:10px;padding:11px 13px;font-size:.81rem;color:#1a3a8c;line-height:1.8;margin-bottom:16px;}
</style>
</head>
<body>
<div class="container">

  <div class="install-banner" id="installBanner">
    <span>📱 홈 화면에 앱으로 설치할 수 있어요!</span>
    <div style="display:flex;gap:6px;">
      <button onclick="installApp()">설치하기</button>
      <button class="xbtn" onclick="document.getElementById('installBanner').classList.remove('show')">✕</button>
    </div>
  </div>

  <div class="header">
    <h1>📋 도 전입시험 랜덤 퀴즈</h1>
    <div class="sub">경상남도 전입시험 대비 · 총 <span id="totalCount">495</span>문항</div>
  </div>

  <div class="tab-bar">
    <button class="tbtn active" id="btn-random"     onclick="setMode('random')">🔀 랜덤</button>
    <button class="tbtn"        id="btn-section"    onclick="setMode('section')">🏷 파트별</button>
    <button class="tbtn"        id="btn-sequential" onclick="setMode('sequential')">📖 순서대로</button>
    <button class="tbtn"        id="btn-wrong"      onclick="setMode('wrong')">❌ 오답만</button>
    <button class="tbtn"        id="btn-unseen"     onclick="setMode('unseen')">👁 미풀이</button>
    <button class="tbtn"        id="btn-exam"       onclick="setMode('exam')">📝 모의고사</button>
    <button class="tbtn"        id="btn-review"     onclick="setMode('review')">🃏 복습</button>
    <button class="tbtn"        id="btn-analysis"   onclick="setMode('analysis')">📊 분석</button>
  </div>
  <div class="sec-label" id="secLabel">전체 문제 랜덤 출제</div>

  <div class="stats">
    <div class="stat"><strong id="s-solved">0</strong>풀이</div>
    <div class="stat"><strong id="s-correct">0</strong>정답</div>
    <div class="stat"><strong id="s-wrong">0</strong>오답</div>
    <div class="stat"><strong id="s-acc">0%</strong>정확도</div>
    <div class="stat"><strong id="s-remain">495</strong>남은문제</div>
  </div>
  <div class="prog-wrap"><div class="prog-bar" id="progBar" style="width:0%"></div></div>

  <!-- 파트별 선택 -->
  <div class="screen" id="scrSection">
    <h2 style="font-size:1rem;color:#1a3a5c;margin-bottom:14px;">🏷 파트 선택</h2>
    <div class="sec-grid" id="secGrid"></div>
    <button class="btn btn-p" style="width:100%" onclick="startSection()">▶ 선택한 파트 시작</button>
  </div>

  <!-- 모의고사 설정 -->
  <div class="screen" id="scrExamSetup">
    <h2 style="font-size:1rem;color:#1a3a5c;margin-bottom:14px;">📝 모의고사 문항 수 선택</h2>
    <div class="exam-grid">
      <button class="ecnt sel" onclick="selExamCnt(20,this)">20<small>문항</small></button>
      <button class="ecnt"    onclick="selExamCnt(50,this)">50<small>문항</small></button>
      <button class="ecnt"    onclick="selExamCnt(100,this)">100<small>문항</small></button>
      <button class="ecnt"    onclick="selExamCnt(495,this)">전체<small>495문항</small></button>
    </div>
    <button class="btn btn-p" style="width:100%" onclick="startExam()">▶ 모의고사 시작</button>
  </div>

  <!-- 퀴즈 풀이 -->
  <div class="screen" id="scrQuiz">
    <div class="q-meta-row">
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
        <span class="q-meta" id="qMeta"></span>
        <span class="sec-tag" id="secTag"></span>
      </div>
      <div class="wrong-badge" id="wrongBadge">❌ 오답 <span id="wcNum">0</span>회</div>
    </div>
    <div class="question" id="questionText">아래 시작 버튼을 눌러 퀴즈를 시작하세요.</div>
    <div class="choices" id="choicesCont"></div>
    <div class="feedback" id="feedback">
      <span class="fb-icon" id="fbIcon"></span>
      <span id="fbText"></span>
    </div>
    <div class="actions">
      <button class="btn btn-p" id="nextBtn" onclick="handleNext()">▶ 시작하기</button>
      <button class="btn btn-d" onclick="resetAll()">🔄 초기화</button>
    </div>
  </div>

  <!-- 결과 -->
  <div class="screen result-screen" id="scrResult">
    <div class="result-circle">
      <div class="score" id="rScore">0%</div>
      <div class="label">정확도</div>
    </div>
    <h2 id="rTitle"></h2>
    <p  id="rDesc"></p>
    <div id="examWrongList"></div>
    <div class="actions" style="justify-content:center;margin-top:16px;">
      <button class="btn btn-p" onclick="restartSession()">다시 풀기</button>
      <button class="btn btn-d" onclick="resetAll()">전체 초기화</button>
    </div>
  </div>

  <!-- 오답 분석 -->
  <div class="screen" id="scrAnalysis">
    <h2 style="font-size:1rem;color:#1a3a5c;margin-bottom:14px;">📊 오답 분석</h2>
    <div class="an-cards">
      <div class="an-card" style="background:#eaf2fb;"><div class="alabel">총 풀이</div><div class="aval" style="color:#1a5276;" id="an-total">0</div></div>
      <div class="an-card" style="background:#e8f8f0;"><div class="alabel">정답</div><div class="aval" style="color:#27ae60;" id="an-correct">0</div></div>
      <div class="an-card" style="background:#fdf0f0;"><div class="alabel">오답</div><div class="aval" style="color:#c0392b;" id="an-wrong">0</div></div>
    </div>
    <div style="margin-bottom:16px;">
      <div style="display:flex;justify-content:space-between;font-size:.79rem;color:#666;margin-bottom:5px;">
        <span>전체 정확도</span><span id="an-acc">0%</span>
      </div>
      <div style="height:9px;background:#e0ecf8;border-radius:99px;overflow:hidden;">
        <div id="an-acc-bar" style="height:100%;background:linear-gradient(90deg,#2980b9,#1abc9c);border-radius:99px;width:0%;transition:width .6s;"></div>
      </div>
    </div>
    <div style="font-size:.85rem;font-weight:700;color:#1a3a8c;margin-bottom:7px;">🃏 에빙하우스 복습 예정</div>
    <div class="review-box" id="an-review-info"></div>
    <div style="font-size:.85rem;font-weight:700;color:#c0392b;margin-bottom:7px;">🔴 오답 횟수 TOP 10</div>
    <div id="an-top10" style="margin-bottom:16px;"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;">
      <div style="font-size:.85rem;font-weight:700;color:#1a3a5c;">전체 오답 문제 목록</div>
      <div style="font-size:.75rem;color:#999;" id="an-wrong-total"></div>
    </div>
    <div id="an-wrong-list"></div>
  </div>

function saveState(){ try{localStorage.setItem('quiz_v5',JSON.stringify(STATE));}catch(e){} }
var STATE=loadState();
function getKey(q){ return (q.section||'').substring(0,4)+q.num+'_'+q.q.substring(0,12); }

/* 화면 전환 */
var SCREENS=['scrSection','scrExamSetup','scrQuiz','scrResult','scrAnalysis'];
function showOnly(id){
  SCREENS.forEach(function(s){ document.getElementById(s).classList.remove('show'); });
  if(id) document.getElementById(id).classList.add('show');
}

/* 섹션 그리드 초기화 */
function initSectionGrid(){
  var grid=document.getElementById('secGrid');
  grid.innerHTML='';
  selectedSections=SECTIONS.slice(); // 기본 전체 선택
  SECTIONS.forEach(function(sec){
    var cnt=ALL_QUESTIONS.filter(function(q){return q.section===sec;}).length;
    var btn=document.createElement('button');
    btn.className='sec-btn sel';
    btn.innerHTML=sec+'<span class="cnt">'+cnt+'문항</span>';
    btn.onclick=function(){
      if(btn.classList.contains('sel')){
        btn.classList.remove('sel');
        selectedSections=selectedSections.filter(function(s){return s!==sec;});
      }else{
        btn.classList.add('sel');
        selectedSections.push(sec);
      }
    };
    grid.appendChild(btn);
  });
}

/* 모드 전환 */
var MODE_LABELS={
  random:'전체 문제 랜덤 출제', section:'파트별 선택 출제',
  sequential:'문제 순서대로 출제', wrong:'오답 문제만 출제 (오답 많은 순)',
  unseen:'미풀이 문제만 출제', exam:'모의고사 — 문항 수를 선택하세요',
  review:'에빙하우스 복습 — 오늘 복습할 문제', analysis:'오답 분석 — 나의 학습 현황'
};
function setMode(m){
  mode=m;
  document.querySelectorAll('.tbtn').forEach(function(b){b.classList.remove('active');});
  document.getElementById('btn-'+m).classList.add('active');
  document.getElementById('secLabel').textContent=MODE_LABELS[m]||'';
  started=false; currentQ=null; answered=false;
  if(m==='exam'){ showOnly('scrExamSetup'); }
  else if(m==='section'){ initSectionGrid(); showOnly('scrSection'); }
  else if(m==='analysis'){ renderAnalysis(); showOnly('scrAnalysis'); }
  else if(m==='review'){
    buildReviewQueue();
    showOnly('scrQuiz');
    if(reviewQueue.length===0){ resetQuizUI(); document.getElementById('questionText').textContent='오늘 복습할 문제가 없습니다! 내일 다시 확인해 보세요 😊'; }
    else{ queue=reviewQueue; currentIdx=0; started=true; sessionSolved=0; sessionCorrect=0; document.getElementById('wrongBadge').className='wrong-badge'; loadQuestion(); }
  }else{ showOnly('scrQuiz'); resetQuizUI(); }
  updateStats();
}

function startSection(){
  if(selectedSections.length===0){ alert('파트를 하나 이상 선택해주세요!'); return; }
  var pool=ALL_QUESTIONS.filter(function(q){ return selectedSections.indexOf(q.section)>=0; });
  queue=shuffle(pool); currentIdx=0; started=true; sessionSolved=0; sessionCorrect=0;
  showOnly('scrQuiz'); document.getElementById('wrongBadge').className='wrong-badge';
  loadQuestion(); updateStats();
}

function resetQuizUI(){
  document.getElementById('questionText').textContent='아래 시작 버튼을 눌러 퀴즈를 시작하세요.';
  document.getElementById('questionText').className='question';
  document.getElementById('qMeta').textContent='';
  document.getElementById('secTag').textContent='';
  document.getElementById('choicesCont').innerHTML='';
  document.getElementById('feedback').className='feedback';
  document.getElementById('wrongBadge').className='wrong-badge';
  document.getElementById('nextBtn').textContent='▶ 시작하기';
}

/* 통계 */
function updateStats(){
  var seen=Object.keys(STATE.seen).length, cor=Object.keys(STATE.correct).length, wrg=Object.keys(STATE.wrong).length;
  document.getElementById('s-solved').textContent=seen;
  document.getElementById('s-correct').textContent=cor;
  document.getElementById('s-wrong').textContent=wrg;
  document.getElementById('s-acc').textContent=seen>0?Math.round(cor/seen*100)+'%':'0%';
  var rem=started?Math.max(0,queue.length-currentIdx):ALL_QUESTIONS.length-seen;
  document.getElementById('s-remain').textContent=rem;
  document.getElementById('progBar').style.width=ALL_QUESTIONS.length>0?(seen/ALL_QUESTIONS.length*100)+'%':'0%';
}

/* 큐 */
function shuffle(arr){
  for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=arr[i];arr[i]=arr[j];arr[j]=t;}
  return arr;
}
function buildQueue(){
  var pool=ALL_QUESTIONS.slice();
  if(mode==='wrong'){ pool=pool.filter(function(q){return STATE.wrong[getKey(q)];}); pool.sort(function(a,b){return(STATE.wrongCount[getKey(b)]||0)-(STATE.wrongCount[getKey(a)]||0);}); }
  else if(mode==='unseen'){ pool=pool.filter(function(q){return !STATE.seen[getKey(q)];}); }
  else{ shuffle(pool); }
  queue=pool; currentIdx=0;
}

/* 오답 뱃지 */
function showBadge(q){
  var cnt=STATE.wrongCount[getKey(q)]||0;
  var badge=document.getElementById('wrongBadge'), qbox=document.getElementById('questionText');
  badge.className='wrong-badge'; qbox.className='question';
  if(cnt===0) return;
  document.getElementById('wcNum').textContent=cnt;
  var lv=cnt>=5?3:cnt>=3?2:1;
  badge.className='wrong-badge show lv'+lv;
  qbox.className='question lv'+lv;
}

/* 문제 렌더 */
function loadQuestion(){
  if(currentIdx>=queue.length){ showResult(); return; }
  currentQ=queue[currentIdx]; answered=false;
  var q=currentQ, isExam=(mode==='exam');
  document.getElementById('qMeta').textContent=(currentIdx+1)+' / '+queue.length+'문제'+(isExam?' (모의고사)':'');
  document.getElementById('secTag').textContent=q.section||'';
  document.getElementById('questionText').textContent=q.q;
  document.getElementById('feedback').className='feedback';
  if(!isExam) showBadge(q); else document.getElementById('wrongBadge').className='wrong-badge';
  var cont=document.getElementById('choicesCont'); cont.innerHTML='';
  var circles=['①','②','③','④'];
  for(var i=0;i<q.choices.length;i++){
    (function(idx){
      var btn=document.createElement('button'); btn.className='cbtn';
      var ns=document.createElement('span'); ns.className='num';
      ns.textContent=circles[idx]||String(idx+1);
      var ts=document.createElement('span');
      var raw=q.choices[idx];
      ts.textContent=('①②③④'.indexOf(raw.charAt(0))>=0)?raw.substring(1).trim():raw;
      btn.appendChild(ns); btn.appendChild(ts);
      btn.onclick=function(){doAnswer(idx,btn,q);};
      cont.appendChild(btn);
    })(i);
  }
  document.getElementById('nextBtn').textContent=isExam?'다음 문제 ▶':'건너뛰기 ⏭';
  updateStats();
}

/* 답안 처리 */
function doAnswer(idx,btn,q){
  if(answered) return; answered=true;
  var isExam=(mode==='exam');
  var correct=q.answer, selChar=q.choices[idx].charAt(0), isOK=(selChar===correct);
  var corrIdx=-1;
  for(var i=0;i<q.choices.length;i++){if(q.choices[i].charAt(0)===correct){corrIdx=i;break;}}
  var allBtns=document.querySelectorAll('.cbtn');
  for(var i=0;i<allBtns.length;i++) allBtns[i].disabled=true;
  if(isExam){
    btn.classList.add('exam-sel');
    examAnswers.push({q:q,myIdx:idx,myChar:selChar,corrIdx:corrIdx,corrChar:correct,isOK:isOK});
    document.getElementById('nextBtn').textContent=currentIdx+1>=queue.length?'결과 보기 🏁':'다음 문제 ▶';
  }else{
    if(isOK){btn.classList.add('correct');}
    else{btn.classList.add('wrong');if(corrIdx>=0&&allBtns[corrIdx])allBtns[corrIdx].classList.add('reveal');}
    var fb=document.getElementById('feedback');
    fb.className='feedback '+(isOK?'ok':'ng')+' show';
    document.getElementById('fbIcon').textContent=isOK?'✅':'❌';
    document.getElementById('fbText').textContent=isOK?'정답입니다!':'오답! 정답: '+(corrIdx>=0?q.choices[corrIdx]:correct);
    recordAnswer(q,isOK);
    document.getElementById('nextBtn').textContent=currentIdx+1>=queue.length?'결과 보기 🏁':'다음 문제 ▶';
  }
  sessionSolved++; if(isOK) sessionCorrect++; currentIdx++; updateStats();
}

/* 에빙하우스 */
function todayStr(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
var INTERVALS=[1,3,7,14,30];
function nextDue(key,reset){
  var cur=STATE.reviewSchedule[key], curIv=cur?cur.interval:0;
  var nextIv=INTERVALS[INTERVALS.length-1];
  for(var i=0;i<INTERVALS.length;i++){if(reset?INTERVALS[i]>curIv:INTERVALS[i]>0){nextIv=INTERVALS[i];break;}}
  var d=new Date(); d.setDate(d.getDate()+nextIv);
  var ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  STATE.reviewSchedule[key]={dueDate:ds,interval:nextIv};
}
function recordAnswer(q,isOK){
  var key=getKey(q); STATE.seen[key]=true;
  if(isOK){STATE.correct[key]=true;delete STATE.wrong[key];nextDue(key,true);}
  else{STATE.wrong[key]=true;delete STATE.correct[key];STATE.wrongCount[key]=(STATE.wrongCount[key]||0)+1;showBadge(q);nextDue(key,false);}
  saveState();
}
function buildReviewQueue(){
  var today=todayStr();
  reviewQueue=shuffle(ALL_QUESTIONS.filter(function(q){
    var key=getKey(q),sc=STATE.reviewSchedule[key];
    return sc?sc.dueDate<=today:!!STATE.wrong[key];
  }));
}

/* 다음 버튼 */
function handleNext(){
  if(!started){
    started=true; sessionSolved=0; sessionCorrect=0; buildQueue();
    if(queue.length===0){
      document.getElementById('questionText').textContent=
        mode==='wrong'?'오답 문제가 없습니다!':mode==='unseen'?'미풀이 문제가 없습니다!':'문제가 없습니다.';
      started=false; return;
    }
    loadQuestion(); return;
  }
  if(!answered&&mode!=='exam') currentIdx++;
  loadQuestion();
}

/* 모의고사 */
function selExamCnt(n,btn){
  examCount=n;
  document.querySelectorAll('.ecnt').forEach(function(b){b.classList.remove('sel');});
  btn.classList.add('sel');
}
function startExam(){
  examAnswers=[];sessionSolved=0;sessionCorrect=0;
  queue=shuffle(ALL_QUESTIONS.slice()).slice(0,examCount);
  currentIdx=0;started=true;
  showOnly('scrQuiz');document.getElementById('wrongBadge').className='wrong-badge';
  loadQuestion();updateStats();
}

/* 결과 */
function showResult(){
  var acc=sessionSolved>0?Math.round(sessionCorrect/sessionSolved*100):0;
  showOnly('scrResult');
  document.getElementById('rScore').textContent=acc+'%';
  document.getElementById('rTitle').textContent=acc>=90?'🏆 완벽합니다!':acc>=70?'👍 잘 하셨습니다!':acc>=50?'💪 조금 더 연습해요!':'📚 다시 도전해봐요!';
  if(mode==='exam'){
    document.getElementById('rDesc').textContent='총 '+sessionSolved+'문제 중 '+sessionCorrect+'문제 정답\n점수: '+acc+'점';
    for(var i=0;i<examAnswers.length;i++) recordAnswer(examAnswers[i].q,examAnswers[i].isOK);
    var wList=examAnswers.filter(function(a){return !a.isOK;});
    var el=document.getElementById('examWrongList'); el.innerHTML='';
    if(wList.length>0){
      var h3=document.createElement('h3');
      h3.style.cssText='font-size:.9rem;color:#c0392b;margin-bottom:9px;padding-bottom:5px;border-bottom:1px solid #fce0de;text-align:left;';
      h3.textContent='❌ 오답 목록 ('+wList.length+'개)'; el.appendChild(h3);
      for(var i=0;i<wList.length;i++){
        var a=wList[i],div=document.createElement('div');div.className='exam-wrong-item';
        var qd=document.createElement('div');qd.className='iq';qd.textContent='Q'+(i+1)+'. '+a.q.q;
        var md=document.createElement('div');md.className='imy';md.textContent='내 답: '+(a.myIdx>=0?a.q.choices[a.myIdx]:a.myChar);
        var ad=document.createElement('div');ad.className='ians';ad.textContent='정답: '+(a.corrIdx>=0?a.q.choices[a.corrIdx]:a.corrChar);
        div.appendChild(qd);div.appendChild(md);div.appendChild(ad);el.appendChild(div);
      }
    }else{var pd=document.createElement('p');pd.style.cssText='color:#27ae60;font-weight:700;text-align:center;margin-top:10px;';pd.textContent='🎉 전부 맞혔습니다!';el.appendChild(pd);}
  }else{
    document.getElementById('examWrongList').innerHTML='';
    var wc=[];for(var k in STATE.wrongCount)if(STATE.wrongCount[k]>0)wc.push({k:k,c:STATE.wrongCount[k]});
    wc.sort(function(a,b){return b.c-a.c;});
    var top='';
    if(wc.length>0){top='\n\n🔴 오답 TOP '+Math.min(3,wc.length)+':';for(var i=0;i<Math.min(3,wc.length);i++)top+='\n  · '+wc[i].k.split('_').slice(1).join('_')+'… ('+wc[i].c+'회)';}
    document.getElementById('rDesc').textContent='이번 세션: '+sessionSolved+'문제, '+sessionCorrect+'정답 ('+acc+'%)\n누적 오답: '+Object.keys(STATE.wrong).length+'개 · 진행률: '+Object.keys(STATE.seen).length+'/'+ALL_QUESTIONS.length+top;
  }
}

/* 오답 분석 */
function renderAnalysis(){
  var seen=Object.keys(STATE.seen).length,cor=Object.keys(STATE.correct).length,wrg=Object.keys(STATE.wrong).length;
  var acc=seen>0?Math.round(cor/seen*100):0;
  document.getElementById('an-total').textContent=seen;
  document.getElementById('an-correct').textContent=cor;
  document.getElementById('an-wrong').textContent=wrg;
  document.getElementById('an-acc').textContent=acc+'%';
  document.getElementById('an-acc-bar').style.width=acc+'%';
  var today=todayStr(),dueT=0,dueN=0,dueW=0;
  var tmr=new Date();tmr.setDate(tmr.getDate()+1);
  var tmrS=tmr.getFullYear()+'-'+String(tmr.getMonth()+1).padStart(2,'0')+'-'+String(tmr.getDate()).padStart(2,'0');
  var wkl=new Date();wkl.setDate(wkl.getDate()+7);
  var wklS=wkl.getFullYear()+'-'+String(wkl.getMonth()+1).padStart(2,'0')+'-'+String(wkl.getDate()).padStart(2,'0');
  for(var k in STATE.reviewSchedule){var dd=STATE.reviewSchedule[k].dueDate;if(dd<=today)dueT++;else if(dd<=tmrS)dueN++;else if(dd<=wklS)dueW++;}
  var noSched=0;for(var wk in STATE.wrong){if(!STATE.reviewSchedule[wk])noSched++;}
  dueT+=noSched;
  document.getElementById('an-review-info').innerHTML='오늘 복습 대상: <strong style="color:#c0392b;">'+dueT+'문제</strong> &nbsp;|&nbsp; 내일: <strong>'+dueN+'문제</strong> &nbsp;|&nbsp; 이번 주: <strong>'+dueW+'문제</strong><br><span style="font-size:.73rem;color:#5d6fa8;">복습카드 탭에서 오늘의 문제를 바로 풀 수 있습니다.</span>';
  var wcL=[];for(var k in STATE.wrongCount)if(STATE.wrongCount[k]>0)wcL.push({k:k,c:STATE.wrongCount[k]});
  wcL.sort(function(a,b){return b.c-a.c;});
  var top10=document.getElementById('an-top10');top10.innerHTML='';
  if(wcL.length===0){top10.innerHTML='<p style="color:#999;font-size:.8rem;text-align:center;padding:10px 0;">아직 오답 기록이 없습니다.</p>';}
  else{var rc=['g','s','b'];for(var i=0;i<Math.min(10,wcL.length);i++){var item=wcL[i];var div=document.createElement('div');div.className='an-top-item';div.innerHTML='<div class="an-top-rank '+(i<3?rc[i]:'')+'>'+(i+1)+'</div><div style="flex:1;color:#1a3a5c;">'+item.k.split('_').slice(1).join('_')+'…</div><div style="font-weight:700;color:#c0392b;min-width:38px;text-align:right;">'+item.c+'회</div>';top10.appendChild(div);}}
  document.getElementById('an-wrong-total').textContent=wrg+'문제';
  var wListEl=document.getElementById('an-wrong-list');wListEl.innerHTML='';
  if(wrg===0){wListEl.innerHTML='<p style="color:#27ae60;font-size:.8rem;text-align:center;padding:10px 0;">현재 오답 문제가 없습니다 🎉</p>';return;}
  var matched=ALL_QUESTIONS.filter(function(q){return STATE.wrong[getKey(q)];});
  matched.sort(function(a,b){return(STATE.wrongCount[getKey(b)]||0)-(STATE.wrongCount[getKey(a)]||0);});
  for(var i=0;i<matched.length;i++){
    var q=matched[i],key2=getKey(q),cnt2=STATE.wrongCount[key2]||1,corrIdx=-1;
    for(var j=0;j<q.choices.length;j++){if(q.choices[j].charAt(0)===q.answer){corrIdx=j;break;}}
    var div2=document.createElement('div');div2.className='an-wrong-item';
    div2.innerHTML='<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:7px;"><div style="flex:1;font-size:.78rem;color:#888;margin-bottom:2px;">['+q.section+']</div><div style="font-size:.72rem;color:#c0392b;white-space:nowrap;font-weight:700;">❌ '+cnt2+'회</div></div><div>'+q.q+'</div><div class="an-wrong-ans">정답: '+(corrIdx>=0?q.choices[corrIdx]:q.answer)+'</div>';
    wListEl.appendChild(div2);
  }
}

/* 재시작 / 초기화 */
function restartSession(){
  started=false;answered=false;currentQ=null;sessionSolved=0;sessionCorrect=0;examAnswers=[];
  if(mode==='exam')showOnly('scrExamSetup');
  else if(mode==='section'){initSectionGrid();showOnly('scrSection');}
  else if(mode==='analysis'){renderAnalysis();showOnly('scrAnalysis');}
  else{showOnly('scrQuiz');resetQuizUI();}
  updateStats();
}
function resetAll(){
  if(!confirm('모든 풀이 기록을 초기화하시겠습니까?')) return;
  STATE={correct:{},wrong:{},seen:{},wrongCount:{},reviewSchedule:{}};saveState();
  started=false;answered=false;currentQ=null;sessionSolved=0;sessionCorrect=0;examAnswers=[];
  showOnly('scrQuiz');resetQuizUI();updateStats();
}

/* 초기 실행 */
showOnly('scrQuiz');
updateStats();
</script>
